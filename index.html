<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hooda Real Estate — AI Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1612;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --cream: #f7f3ec;
    --warm-white: #fdfaf5;
    --muted: #7a7060;
    --surface: #ffffff;
    --border: #e8e0d0;
    --chat-bg: #faf7f2;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── HERO BACKGROUND ── */
  .hero {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(135deg, #1a1612 0%, #2d2419 50%, #1a1612 100%);
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(201,168,76,.06) 80px),
      repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(201,168,76,.06) 80px);
  }
  .hero::after {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    top: -100px; right: -100px;
    background: radial-gradient(circle, rgba(201,168,76,.15) 0%, transparent 70%);
    border-radius: 50%;
  }

  /* ── WRAPPER ── */
  .wrapper {
    position: relative; z-index: 1;
    width: 100%; max-width: 480px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-height: 900px;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    padding: 24px 0 20px;
    animation: fadeDown .6s ease both;
  }
  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--gold), #a07830);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 3px;
    color: var(--gold-light);
    text-transform: uppercase;
  }
  .tagline {
    font-size: 12px;
    letter-spacing: 2px;
    color: rgba(201,168,76,.5);
    text-transform: uppercase;
  }

  /* ── CHAT CARD ── */
  .chat-card {
    flex: 1;
    background: var(--warm-white);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,.4), 0 0 0 1px rgba(201,168,76,.2);
    animation: fadeUp .6s .2s ease both;
  }

  .chat-top-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px;
    background: var(--ink);
    border-bottom: 1px solid rgba(201,168,76,.2);
  }
  .agent-avatar {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--gold), #a07830);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .agent-info { flex: 1; }
  .agent-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--gold-light);
    letter-spacing: .5px;
  }
  .agent-status {
    font-size: 11px;
    color: rgba(201,168,76,.5);
    display: flex; align-items: center; gap: 5px;
  }
  .status-dot {
    width: 7px; height: 7px;
    background: #5cb85c;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  .top-actions { display: flex; gap: 8px; }
  .top-btn {
    background: rgba(201,168,76,.1);
    border: 1px solid rgba(201,168,76,.2);
    color: var(--gold);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: .5px;
    transition: all .2s;
  }
  .top-btn:hover { background: rgba(201,168,76,.2); }

  /* ── MESSAGES ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: var(--chat-bg);
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 10px;
    animation: msgIn .3s ease both;
  }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .msg.agent .msg-avatar { background: linear-gradient(135deg, var(--gold), #a07830); }
  .msg.user .msg-avatar { background: var(--ink); color: var(--gold); font-size: 12px; }

  .msg-bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
  }
  .msg.agent .msg-bubble {
    background: var(--surface);
    color: var(--ink);
    border-radius: 4px 16px 16px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .msg.user .msg-bubble {
    background: var(--ink);
    color: var(--gold-light);
    border-radius: 16px 4px 16px 16px;
  }

  /* Quick reply chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
    padding-left: 42px;
    animation: msgIn .3s .1s ease both;
  }
  .chip {
    background: var(--surface);
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .chip:hover { background: var(--gold); color: var(--surface); }

  /* Lead summary card */
  .lead-card {
    background: var(--ink);
    border: 1px solid rgba(201,168,76,.3);
    border-radius: 12px;
    padding: 16px;
    margin-top: 4px;
    animation: msgIn .3s ease both;
  }
  .lead-card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .lead-card-row {
    display: flex; justify-content: space-between;
    font-size: 12px; margin-bottom: 6px;
    color: rgba(247,243,236,.7);
  }
  .lead-card-row span:last-child { color: var(--gold-light); font-weight: 500; }
  .lead-actions { display: flex; gap: 8px; margin-top: 14px; }
  .lead-btn {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    border: none;
    transition: all .2s;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: .5px;
  }
  .lead-btn.primary { background: var(--gold); color: var(--ink); font-weight: 500; }
  .lead-btn.secondary { background: rgba(201,168,76,.1); color: var(--gold); border: 1px solid rgba(201,168,76,.3); }
  .lead-btn:hover { filter: brightness(1.1); }

  /* Typing indicator */
  .typing { display: flex; gap: 10px; align-items: center; }
  .typing-dots { display: flex; gap: 4px; padding: 12px 16px; background: var(--surface); border-radius: 4px 16px 16px 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .typing-dots span {
    width: 7px; height: 7px;
    background: var(--gold);
    border-radius: 50%;
    animation: bounce .8s infinite;
    opacity: .5;
  }
  .typing-dots span:nth-child(2) { animation-delay: .15s; }
  .typing-dots span:nth-child(3) { animation-delay: .3s; }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 16px;
    background: var(--warm-white);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #userInput {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--ink);
    resize: none;
    max-height: 100px;
    line-height: 1.5;
    transition: border-color .2s;
    outline: none;
  }
  #userInput:focus { border-color: var(--gold); }
  #userInput::placeholder { color: var(--muted); }

  #sendBtn {
    width: 44px; height: 44px;
    background: var(--gold);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    flex-shrink: 0;
  }
  #sendBtn:hover { background: #b89040; transform: scale(1.05); }
  #sendBtn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  #sendBtn svg { width: 18px; height: 18px; }

  .input-footer {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .5px;
  }

  /* ── LEAD PANEL (right side on desktop) ── */
  @media (min-width: 900px) {
    body { flex-direction: row; gap: 0; }
    .wrapper { max-height: 100vh; max-width: 460px; }
    .leads-panel {
      position: relative; z-index: 1;
      width: 320px;
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }
  }
  @media (max-width: 899px) {
    .leads-panel { display: none; }
  }

  .leads-panel {
    animation: fadeLeft .6s .4s ease both;
  }
  .panel-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(201,168,76,.2);
  }
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat-box {
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(201,168,76,.15);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--gold);
    font-weight: 300;
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: 1px;
    color: rgba(201,168,76,.5);
    margin-top: 4px;
    text-transform: uppercase;
  }
  .leads-list { display: flex; flex-direction: column; gap: 10px; }
  .lead-item {
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(201,168,76,.1);
    border-radius: 12px;
    padding: 14px;
    transition: border-color .2s;
    cursor: pointer;
  }
  .lead-item:hover { border-color: rgba(201,168,76,.3); }
  .lead-item-name {
    font-size: 14px;
    color: var(--gold-light);
    font-weight: 500;
    margin-bottom: 4px;
  }
  .lead-item-detail {
    font-size: 11px;
    color: rgba(201,168,76,.5);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .lead-score {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .score-hot { background: rgba(220,80,60,.15); color: #e07060; border: 1px solid rgba(220,80,60,.3); }
  .score-warm { background: rgba(201,168,76,.15); color: var(--gold); border: 1px solid rgba(201,168,76,.3); }
  .score-cold { background: rgba(100,120,150,.15); color: #88a0b8; border: 1px solid rgba(100,120,150,.3); }

  /* ── KEYFRAMES ── */
  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeLeft { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
  @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
</style>
</head>

<script>
// ─── STATE ───────────────────────────────────────────────────
const leads = [];
let currentLead = {};
let conversationHistory = [];
let isTyping = false;

const SYSTEM_PROMPT = `You are Aria, an expert real estate lead qualification agent for Hooda Real Estate — Ravi & Rashmi Hooda Real Estate Brokers.

Your personality: warm, professional, knowledgeable, elegant. You speak with confidence and sophistication befitting a luxury brand.

Your goals in order:
1. Warmly greet visitors and understand their property needs
2. Qualify them by asking smart questions (budget, timeline, property type, location, reason for buying/investing)
3. Collect contact information naturally (name, email, phone)
4. Assess their lead score (hot/warm/cold) based on budget, timeline, motivation
5. Offer to book a consultation appointment

Qualification questions to work through naturally (not all at once):
- Are they buying, selling, or investing?
- Property type: condo, townhouse, detached, commercial?
- Preferred neighborhoods or areas?
- Budget range?
- Timeline: when do they want to move/close?
- Are they pre-approved for financing?
- What's their primary motivation?

Lead scoring rules:
- HOT: Budget $500K+, timeline <3 months, pre-approved or cash buyer
- WARM: Budget $300-500K, timeline 3-6 months, mortgage in progress  
- COLD: Just browsing, no clear timeline, budget unknown

Always extract structured data and include a JSON block at the end of your response when you've collected key info. Format:
<lead_data>{"name":"...","email":"...","phone":"...","budget":"...","timeline":"...","propertyType":"...","area":"...","score":"hot|warm|cold","appointmentRequested":true|false}</lead_data>

Keep responses concise (2-4 sentences max). Be conversational, not robotic. Use the visitor's name once you know it.

Start by greeting the visitor warmly and asking what brings them here today.`;

// ─── INIT ─────────────────────────────────────────────────────
window.onload = () => {
  startConversation();
};

async function startConversation() {
  await callClaude("Hello");
}

// ─── SEND MESSAGE ─────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isTyping) return;

  input.value = '';
  input.style.height = 'auto';

  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  // Remove chips
  document.querySelectorAll('.chips').forEach(c => c.remove());

  await callClaude(null);
}

// ─── CHIP CLICK ───────────────────────────────────────────────
function chipClick(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

// ─── CALL CLAUDE API ──────────────────────────────────────────
async function callClaude(initMsg) {
  if (isTyping) return;
  isTyping = true;

  document.getElementById('sendBtn').disabled = true;

  // Add initial user message if starting
  if (initMsg && conversationHistory.length === 0) {
    conversationHistory.push({ role: 'user', content: initMsg });
  }

  const typingEl = showTyping();

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const fullText = data.content?.map(b => b.text || '').join('') || "I'm sorry, something went wrong.";

    // Extract lead data JSON if present
    const leadMatch = fullText.match(/<lead_data>([\s\S]*?)<\/lead_data>/);
    let cleanText = fullText.replace(/<lead_data>[\s\S]*?<\/lead_data>/g, '').trim();

    typingEl.remove();
    appendMessage('agent', cleanText);
    conversationHistory.push({ role: 'assistant', content: fullText });

    if (leadMatch) {
      try {
        const ld = JSON.parse(leadMatch[1]);
        updateLead(ld);
        if (ld.name && ld.email) renderLeadCard(ld);
      } catch(e) {}
    }

    // Show contextual quick replies
    showContextualChips(cleanText);

  } catch (err) {
    typingEl.remove();
    appendMessage('agent', "I apologize — I'm having a brief connection issue. Please try again in a moment.");
  }

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
}

// ─── UI HELPERS ───────────────────────────────────────────────
function appendMessage(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'agent' ? '🤖' : '👤'}</div>
    <div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showContextualChips(text) {
  const lower = text.toLowerCase();
  let chips = [];

  if (lower.includes('buy') || lower.includes('interest') || lower.includes('looking')) {
    chips = ['🏠 Buying a home', '💼 Investment property', '🏢 Commercial space', '💰 Just browsing'];
  } else if (lower.includes('budget') || lower.includes('price') || lower.includes('afford')) {
    chips = ['Under $500K', '$500K–$1M', '$1M–$2M', '$2M+'];
  } else if (lower.includes('timeline') || lower.includes('when') || lower.includes('move')) {
    chips = ['ASAP (< 1 month)', '1–3 months', '3–6 months', 'Just exploring'];
  } else if (lower.includes('appointment') || lower.includes('meet') || lower.includes('consultation')) {
    chips = ['✅ Yes, book a call', '📅 Schedule a tour', '📧 Send me info first'];
  } else if (lower.includes('area') || lower.includes('neighborhood') || lower.includes('location')) {
    chips = ['Downtown', 'Suburbs', 'Waterfront', 'Open to suggestions'];
  }

  if (chips.length > 0) {
    const msgs = document.getElementById('messages');
    const chipDiv = document.createElement('div');
    chipDiv.className = 'chips';
    chipDiv.innerHTML = chips.map(c => `<button class="chip" onclick="chipClick('${c}')">${c}</button>`).join('');
    msgs.appendChild(chipDiv);
    msgs.scrollTop = msgs.scrollHeight;
  }
}

// ─── LEAD MANAGEMENT ──────────────────────────────────────────
function updateLead(ld) {
  Object.assign(currentLead, ld);
}

function renderLeadCard(ld) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'lead-card';
  const scoreClass = ld.score === 'hot' ? 'score-hot' : ld.score === 'warm' ? 'score-warm' : 'score-cold';
  const scoreIcon = ld.score === 'hot' ? '🔥' : ld.score === 'warm' ? '✨' : '❄️';
  div.innerHTML = `
    <div class="lead-card-title">
      📋 Lead Captured
      <span class="lead-score ${scoreClass}">${scoreIcon} ${(ld.score||'new').toUpperCase()}</span>
    </div>
    ${ld.name ? `<div class="lead-card-row"><span>Name</span><span>${ld.name}</span></div>` : ''}
    ${ld.email ? `<div class="lead-card-row"><span>Email</span><span>${ld.email}</span></div>` : ''}
    ${ld.phone ? `<div class="lead-card-row"><span>Phone</span><span>${ld.phone}</span></div>` : ''}
    ${ld.budget ? `<div class="lead-card-row"><span>Budget</span><span>${ld.budget}</span></div>` : ''}
    ${ld.timeline ? `<div class="lead-card-row"><span>Timeline</span><span>${ld.timeline}</span></div>` : ''}
    ${ld.propertyType ? `<div class="lead-card-row"><span>Property</span><span>${ld.propertyType}</span></div>` : ''}
    <div class="lead-actions">
      <button class="lead-btn primary" onclick="saveLead()">💾 Save to CRM</button>
      <button class="lead-btn secondary" onclick="copyLead()">📋 Copy</button>
    </div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function saveLead() {
  if (!currentLead.name && !currentLead.email) return;
  const existing = leads.findIndex(l => l.email === currentLead.email);
  if (existing >= 0) leads[existing] = { ...currentLead, savedAt: new Date() };
  else leads.push({ ...currentLead, id: Date.now(), savedAt: new Date() });
  updateCRMPanel();
  alert(`✅ Lead saved!\n\n${currentLead.name || 'Contact'} added to your CRM pipeline.`);
}

function copyLead() {
  const text = Object.entries(currentLead)
    .filter(([k,v]) => v)
    .map(([k,v]) => `${k}: ${v}`)
    .join('\n');
  navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!'));
}

function updateCRMPanel() {
  const hot = leads.filter(l => l.score === 'hot').length;
  const apts = leads.filter(l => l.appointmentRequested).length;
  document.getElementById('statTotal').textContent = leads.length;
  document.getElementById('statHot').textContent = hot;
  document.getElementById('statAppts').textContent = apts;
  document.getElementById('statConv').textContent = leads.length ? Math.round(hot/leads.length*100) + '%' : '0%';

  const list = document.getElementById('leadsList');
  list.innerHTML = leads.slice(-10).reverse().map(l => {
    const sc = l.score === 'hot' ? 'score-hot' : l.score === 'warm' ? 'score-warm' : 'score-cold';
    const si = l.score === 'hot' ? '🔥' : l.score === 'warm' ? '✨' : '❄️';
    return `<div class="lead-item">
      <div class="lead-item-name">${l.name || 'Anonymous'}</div>
      <div class="lead-item-detail">${l.email||''} · ${l.budget||'Budget TBD'}<br>${l.propertyType||''} · ${l.timeline||''}</div>
      <span class="lead-score ${sc}">${si} ${(l.score||'new').toUpperCase()}</span>
    </div>`;
  }).join('');
}

function exportLeads() {
  if (!leads.length) {
    alert('No leads captured yet. Start chatting to generate leads!');
    return;
  }
  const headers = ['Name','Email','Phone','Budget','Timeline','PropertyType','Area','Score','AppointmentRequested','SavedAt'];
  const rows = leads.map(l => [l.name,l.email,l.phone,l.budget,l.timeline,l.propertyType,l.area,l.score,l.appointmentRequested,l.savedAt].map(v=>v||'').join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv,' + encodeURIComponent(csv);
  a.download = 'hooda-real-estate-leads.csv';
  a.click();
}
</script>
